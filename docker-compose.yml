services:
  postgres:
    profiles: ["full"]
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    volumes:
      - ${AGENT_DATA:?Set AGENT_DATA in .env}/postgres:/var/lib/postgresql/data
      - ./config/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-agentos}
    networks: [agentos]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentos}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- M2: Hermes Agent ---
  hermes:
    build:
      context: ./vendor/hermes-agent
      dockerfile: Dockerfile
    container_name: hermes
    restart: unless-stopped
    extra_hosts: ["host.docker.internal:host-gateway"]
    volumes:
      - ${AGENT_DATA}/hermes:/opt/data
      - ${AGENT_DATA}/gbrain:/opt/gbrain-data:ro
      - ./config/hermes/config.yaml:/opt/hermes/cli-config.yaml.example:ro
      - ./config/hermes/setup-mcp.sh:/opt/hermes/setup-mcp.sh:ro
    environment:
      HERMES_UID: ${HERMES_UID:-10000}
      HERMES_GID: ${HERMES_GID:-10000}
      HERMES_MODEL: ${OLLAMA_MODEL:-qwen3.6:27b-coding-nvfp4}
      HERMES_INFERENCE_PROVIDER: custom
      HERMES_DASHBOARD: "true"
      HERMES_DASHBOARD_HOST: "0.0.0.0"
      HERMES_DASHBOARD_PORT: ${HERMES_DASHBOARD_PORT:-9119}
      API_SERVER_HOST: "0.0.0.0"
      API_SERVER_KEY: ${API_SERVER_KEY}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      # Honcho self-hosted (only effective when full profile is active)
      HONCHO_BASE_URL: ${HONCHO_BASE_URL:-http://honcho:8000}
    ports:
      - "127.0.0.1:${HERMES_DASHBOARD_PORT:-9119}:${HERMES_DASHBOARD_PORT:-9119}"
    command: ["bash", "-c", "bash /opt/hermes/setup-mcp.sh; exec hermes gateway run"]
    networks: [agentos]

  # --- M5: hermes-webui ---
  hermes-webui:
    image: ghcr.io/nesquena/hermes-webui:${WEBUI_TAG:-latest}
    container_name: hermes-webui
    restart: unless-stopped
    depends_on:
      hermes: { condition: service_started }
    volumes:
      - ${AGENT_DATA}/hermes:/home/hermeswebui/.hermes:rw
      - ./vendor/hermes-agent:/home/hermeswebui/.hermes/hermes-agent:ro
    ports:
      - "127.0.0.1:${WEBUI_PORT:-8787}:8787"
    environment:
      HERMES_WEBUI_HOST: "0.0.0.0"
      HERMES_WEBUI_PORT: "8787"
      HERMES_WEBUI_PASSWORD: ${WEBUI_PASSWORD:-}
      HERMES_WEBUI_STATE_DIR: /home/hermeswebui/.hermes/webui
      HERMES_HOME: /home/hermeswebui/.hermes
      HERMES_MODEL: ${OLLAMA_MODEL:-qwen3.6:27b-coding-nvfp4}
      HERMES_INFERENCE_PROVIDER: custom
      WANTED_UID: "10000"
      WANTED_GID: "10000"
    networks: [agentos]

  # =========================================================================
  # Optional services (activated with --profile full)
  # =========================================================================

  # --- M3: GBRAIN ---
  gbrain:
    profiles: ["full"]
    build:
      context: .
      dockerfile: config/gbrain/Dockerfile
    container_name: gbrain
    restart: unless-stopped
    extra_hosts: ["host.docker.internal:host-gateway"]
    volumes:
      - ${AGENT_DATA}/gbrain:/opt/data
    environment:
      GBRAIN_HOME: /opt/data
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    networks: [agentos]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:${GBRAIN_PORT:-3131}/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # --- M4: Honcho (API) ---
  honcho:
    profiles: ["full"]
    build:
      context: ./vendor/honcho
      dockerfile: Dockerfile
    container_name: honcho
    restart: unless-stopped
    entrypoint: ["sh", "/custom-entrypoint.sh"]
    depends_on:
      postgres: { condition: service_healthy }
    extra_hosts: ["host.docker.internal:host-gateway"]
    volumes:
      - ./config/honcho/entrypoint.sh:/custom-entrypoint.sh:ro
    environment:
      DB_CONNECTION_URI: postgresql+psycopg://${POSTGRES_USER:-agentos}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-agentos}
      AUTH_USE_AUTH: "false"
      # LLM via Ollama (OpenAI-compatible)
      LLM_OPENAI_API_KEY: "ollama"
      MODEL_CONFIG__TRANSPORT: openai
      MODEL_CONFIG__MODEL: ${OLLAMA_MODEL:-qwen3.6:27b-coding-nvfp4}
      MODEL_CONFIG__OVERRIDES__BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}/v1
      DERIVER_MODEL_CONFIG__TRANSPORT: openai
      DERIVER_MODEL_CONFIG__MODEL: ${OLLAMA_MODEL:-qwen3.6:27b-coding-nvfp4}
      DERIVER_MODEL_CONFIG__OVERRIDES__BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}/v1
      # Embedding via Ollama
      EMBEDDING_MODEL_CONFIG__TRANSPORT: openai
      EMBEDDING_MODEL_CONFIG__MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      EMBEDDING_MODEL_CONFIG__OVERRIDES__BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}/v1
      EMBEDDING_VECTOR_DIMENSIONS: "${EMBEDDING_DIMS:-768}"
      # Disable features that need Redis
      CACHE_ENABLED: "false"
    networks: [agentos]
    healthcheck:
      test: ["CMD", "/app/.venv/bin/python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # --- M4: Honcho (Deriver worker) ---
  honcho-deriver:
    profiles: ["full"]
    build:
      context: ./vendor/honcho
      dockerfile: Dockerfile
    container_name: honcho-deriver
    restart: unless-stopped
    entrypoint: ["/app/.venv/bin/python", "-m", "src.deriver"]
    depends_on:
      honcho: { condition: service_healthy }
    extra_hosts: ["host.docker.internal:host-gateway"]
    environment:
      DB_CONNECTION_URI: postgresql+psycopg://${POSTGRES_USER:-agentos}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-agentos}
      LLM_OPENAI_API_KEY: "ollama"
      DERIVER_MODEL_CONFIG__TRANSPORT: openai
      DERIVER_MODEL_CONFIG__MODEL: ${OLLAMA_MODEL:-qwen3.6:27b-coding-nvfp4}
      DERIVER_MODEL_CONFIG__OVERRIDES__BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}/v1
      EMBEDDING_MODEL_CONFIG__TRANSPORT: openai
      EMBEDDING_MODEL_CONFIG__MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      EMBEDDING_MODEL_CONFIG__OVERRIDES__BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}/v1
      EMBEDDING_VECTOR_DIMENSIONS: "${EMBEDDING_DIMS:-768}"
      CACHE_ENABLED: "false"
    networks: [agentos]

  # --- M5: Dashboard (monitoring) ---
  dashboard:
    profiles: ["full"]
    build: ./monitoring
    container_name: dashboard
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      gbrain: { condition: service_healthy }
      honcho: { condition: service_healthy }
    extra_hosts: ["host.docker.internal:host-gateway"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-agentos}
      GBRAIN_PORT: ${GBRAIN_PORT:-3131}
      HERMES_DASHBOARD_PORT: ${HERMES_DASHBOARD_PORT:-9119}
      API_SERVER_KEY: ${API_SERVER_KEY}
      OLLAMA_HOST: ${OLLAMA_HOST:-host.docker.internal:11434}
    ports:
      - "127.0.0.1:${DASHBOARD_PORT:-8080}:8080"
    networks: [agentos]

networks:
  agentos:
    driver: bridge
